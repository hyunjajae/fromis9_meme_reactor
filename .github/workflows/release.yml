name: Build & Release (Python)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬(Python) 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 의존성 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller opencv-python numpy mediapipe Pillow ffpyplayer

      - name: PyInstaller 빌드 (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile main.py

      - name: PyInstaller 빌드 (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed main.py
          cd dist
          zip -r main-mac.zip main.app
          cd ..

      - name: GitHub Release 생성 및 업로드
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
